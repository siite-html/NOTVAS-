<h1>Função Apelativa ou Conativa</h1>

<p>Essa função é focada no receptor, ou seja, em quem recebe a mensagem. Ela tenta convencer, dar ordens ou influenciar.</p>

<h2>Características:</h2>
<ul>
    <li>Uso de imperativos (faça, compre, venha)</li>
    <li>Tentativa de convencer</li>
</ul>

<h2>Exemplo:</h2>
<p>"Compre agora e aproveite a promoção!"</p>
